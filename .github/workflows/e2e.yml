name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      dynamodb-local:
        image: amazon/dynamodb-local
        ports:
          - "8000:8000"
        options: >-
          --health-cmd "curl -s http://localhost:8000"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DYNAMODB_ENDPOINT: http://localhost:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE_NAME: TurnkeyWaitlist
      SES_FROM_ADDRESS: noreply@turnkeyhomes.app
      SES_NOTIFY_ADDRESS: kelli@sheepishlabs.com
      SES_SANDBOX: "true"
      ADMIN_TOKEN: ci-admin-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed DynamoDB Local
        run: npx tsx infra/scripts/setup-local.ts

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
